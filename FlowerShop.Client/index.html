<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2AABEE" />
    <title>Цветочный — Доставка букетов в Душанбе</title>
    <!-- Anti-FOUC: apply theme before first paint -->
    <script>
      ;(function(){
        try {
          var s = JSON.parse(localStorage.getItem('flower-theme') || '{}')
          var mode = s.state && s.state.theme ? s.state.theme : 'system'
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch(e){}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
